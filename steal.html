<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Legal Jeopardy — Steal!</title>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0D1424;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:1.5rem;user-select:none}

/* WAITING STATE */
.waiting{text-align:center}
.waiting-icon{font-size:64px;margin-bottom:20px;animation:float 2s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.waiting-title{color:#7A9BB8;font-size:18px;font-weight:700;letter-spacing:1px;margin-bottom:8px}
.waiting-sub{color:#334;font-size:13px}

/* STEAL OPEN STATE */
.steal-open{text-align:center;width:100%;max-width:400px}
.steal-label{color:#F59E0B;font-size:13px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:16px}

/* 5-second timer */
.steal-timer{font-size:72px;font-weight:900;color:#fff;line-height:1;margin-bottom:8px;font-variant-numeric:tabular-nums;transition:color .3s}
.steal-timer.urgent{color:#EF4444;animation:pulse .4s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.timer-bar-wrap{width:100%;height:8px;background:#1E2F50;border-radius:4px;margin-bottom:24px;overflow:hidden}
.timer-bar{height:8px;border-radius:4px;background:#F59E0B;width:100%;transition:width .9s linear,background .3s}
.timer-bar.urgent{background:#EF4444}

/* Team buttons */
.team-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;width:100%}
.team-btn{padding:22px 12px;border-radius:16px;border:3px solid transparent;font-size:16px;font-weight:900;color:#fff;cursor:pointer;transition:transform .08s,opacity .2s;letter-spacing:.5px;min-height:80px}
.team-btn:active{transform:scale(.95)}
.team-btn:disabled{opacity:.3;cursor:not-allowed;transform:none}

/* BUZZED STATE */
.buzzed{text-align:center}
.buzzed-icon{font-size:72px;margin-bottom:16px}
.buzzed-team{font-size:28px;font-weight:900;margin-bottom:8px}
.buzzed-sub{font-size:14px;color:#7A9BB8}

/* LOCKED (someone else buzzed) */
.locked{text-align:center}
.locked-icon{font-size:64px;margin-bottom:16px}
.locked-msg{color:#7A9BB8;font-size:16px;font-weight:700;margin-bottom:4px}
.locked-team{color:#F59E0B;font-size:20px;font-weight:900}
</style>
</head>
<body>

<div id="app"></div>

<script>
// ─── PASTE THE SAME FIREBASE CONFIG AS IN index.html ─────────────────────────
const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCsj2tb4U6U9UeUijBGJOzL_fkrQaIDW6I",
  authDomain: "legal-jeopardy.firebaseapp.com",
  databaseURL: "https://legal-jeopardy-default-rtdb.firebaseio.com",
  projectId: "legal-jeopardy",
  storageBucket: "legal-jeopardy.firebasestorage.app",
  messagingSenderId: "664040596488",
  appId: "1:664040596488:web:625c53ae7a1764e9ac1dbd"
};

const TEAM_COLORS = ['#2563AB','#B83220','#7048B8','#0A6B3E','#B45309'];
const TEAMS       = ['Team A','Team B','Team C','Team D','Team E'];

let db           = null;
let stealOpen    = false;
let timerSecs    = 5;
let timerIv      = null;
let myBuzz       = null;   // team name this device buzzed for
let winnnerLocked = null;  // team name that won the steal

// ── RENDER ───────────────────────────────────────────────────────────────────
function render(state) {
  const app = document.getElementById('app');

  if (state === 'waiting') {
    app.innerHTML = `
      <div class="waiting">
        <div class="waiting-icon">⚖️</div>
        <div class="waiting-title">Legal Jeopardy</div>
        <div class="waiting-sub">Waiting for a steal opportunity…</div>
      </div>`;

  } else if (state === 'open') {
    app.innerHTML = `
      <div class="steal-open">
        <div class="steal-label">⚡ Steal available!</div>
        <div class="steal-timer" id="st-count">${timerSecs}</div>
        <div class="timer-bar-wrap"><div class="timer-bar" id="st-bar"></div></div>
        <div class="team-grid">
          ${TEAMS.map((t,i) => `
            <button class="team-btn" id="btn-${i}"
              style="background:${TEAM_COLORS[i]};border-color:${TEAM_COLORS[i]}"
              onclick="buzz(${i})">${t}</button>`).join('')}
        </div>
      </div>`;
    startStealTimer();

  } else if (state === 'buzzed') {
    const color = TEAM_COLORS[TEAMS.indexOf(myBuzz)];
    app.innerHTML = `
      <div class="buzzed">
        <div class="buzzed-icon">🙋</div>
        <div class="buzzed-team" style="color:${color}">${myBuzz}</div>
        <div class="buzzed-sub">Buzzed in! Waiting for professor…</div>
      </div>`;

  } else if (state === 'locked') {
    app.innerHTML = `
      <div class="locked">
        <div class="locked-icon">🔒</div>
        <div class="locked-msg">Stolen by</div>
        <div class="locked-team">${winnnerLocked}</div>
      </div>`;

  } else if (state === 'closed') {
    app.innerHTML = `
      <div class="waiting">
        <div class="waiting-icon">✅</div>
        <div class="waiting-title">Steal closed</div>
        <div class="waiting-sub">Waiting for next question…</div>
      </div>`;
  }
}

// ── TIMER ────────────────────────────────────────────────────────────────────
function startStealTimer() {
  clearInterval(timerIv);
  timerSecs = 5;
  timerIv = setInterval(() => {
    timerSecs--;
    const countEl = document.getElementById('st-count');
    const barEl   = document.getElementById('st-bar');
    if (!countEl) { clearInterval(timerIv); return; }
    countEl.textContent = timerSecs;
    const pct = (timerSecs / 5) * 100;
    barEl.style.width = pct + '%';
    if (timerSecs <= 2) {
      countEl.classList.add('urgent');
      barEl.classList.add('urgent');
    }
    if (timerSecs <= 0) {
      clearInterval(timerIv);
      // Time up — close steal
      db.ref('steal').set({ open: false, winner: null, timedOut: true });
    }
  }, 1000);
}

// ── BUZZ IN ──────────────────────────────────────────────────────────────────
function buzz(teamIdx) {
  if (!stealOpen) return;
  const teamName = TEAMS[teamIdx];
  myBuzz = teamName;
  clearInterval(timerIv);

  // Try to claim the steal — only first write wins
  const ref = db.ref('steal/winner');
  ref.transaction(current => {
    if (current === null) return teamName;  // claim it
    return;  // someone already claimed it — abort
  }, (err, committed) => {
    if (committed) {
      render('buzzed');
    } else {
      // Someone else was faster
      render('locked');
    }
  });
}

// ── FIREBASE LISTENER ────────────────────────────────────────────────────────
function initApp() {
  firebase.initializeApp(FIREBASE_CONFIG);
  db = firebase.database();

  render('waiting');

  db.ref('steal').on('value', snap => {
    const data = snap.val();
    if (!data) { render('waiting'); return; }

    if (data.winner && data.winner !== myBuzz) {
      // Someone else won
      winnnerLocked = data.winner;
      clearInterval(timerIv);
      render('locked');
    } else if (data.winner && data.winner === myBuzz) {
      // We won
      render('buzzed');
    } else if (data.open) {
      // Steal just opened
      stealOpen  = true;
      myBuzz     = null;
      winnnerLocked = null;
      render('open');
    } else {
      // Steal closed
      stealOpen = false;
      clearInterval(timerIv);
      if (myBuzz) {
        // We buzzed but game moved on
        render('closed');
        myBuzz = null;
      } else {
        render('waiting');
      }
    }
  });
}

initApp();
</script>
</body>
</html>
